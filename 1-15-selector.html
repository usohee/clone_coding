<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      button {
        border: none;
        outline: none;
        background-color: aliceblue;
        padding: 5px 10px 5px 10px;
        font-size: 10px;
        border-radius: 5px;
      }

      div > button:nth-child(3):hover {
        background-color: skyblue;
      }
    </style>
  </head>
  <body>
    <div>
      <button class="btn" id="btn-1">버튼 1</button>
      <button class="btn" id="btn-2">버튼 2</button>
      <button class="btn" id="btn-3">버튼 3</button>
      <button class="btn" id="btn-4">로그인</button>
      <button class="btn" id="btn-5">뒤로가기</button>
    </div>
  </body>
</html>
